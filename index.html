<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#075e54">
  <title>Phat Chat</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}:root{--primary:#075e54;--primary-light:#128c7e;--secondary:#25d366;--bg:#ece5dd;--sent-bg:#dcf8c6;--received-bg:#fff;--text:#000;--text-secondary:#667781;--border:#d1d7db;--danger:#dc3545}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden}#app{height:100%;position:relative}.screen{display:none;height:100%;flex-direction:column}.screen.active{display:flex}.spinner{width:40px;height:40px;border:4px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin 1s linear infinite;margin:auto}@keyframes spin{to{transform:rotate(360deg)}}.app-header{display:flex;align-items:center;padding:12px 16px;background:var(--primary);color:#fff;gap:12px}.app-header h1{flex:1;font-size:20px;font-weight:600}.header-actions{display:flex;gap:8px}.icon-btn{background:none;border:none;font-size:20px;cursor:pointer;padding:8px;border-radius:50%;transition:background .2s}.icon-btn:hover{background:rgba(255,255,255,.2)}.chat-list{flex:1;overflow-y:auto}.chat-item{display:flex;padding:12px 16px;gap:12px;background:#fff;border-bottom:1px solid var(--border);cursor:pointer}.chat-item:hover{background:#f5f5f5}.chat-avatar{width:48px;height:48px;border-radius:50%;background:var(--primary-light);display:flex;align-items:center;justify-content:center;font-size:24px;color:#fff}.chat-details{flex:1;min-width:0}.chat-title{font-weight:600;font-size:16px}.chat-preview{font-size:14px;color:var(--text-secondary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.chat-meta{text-align:right;font-size:12px;color:var(--text-secondary)}.fab{position:absolute;bottom:20px;right:20px;width:56px;height:56px;border-radius:50%;background:var(--secondary);border:none;font-size:24px;cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.2)}.chat-header{display:flex;align-items:center;padding:12px 16px;background:var(--primary);color:#fff;gap:12px}.chat-info{flex:1}.chat-name{font-weight:600;font-size:16px;display:block}.chat-status{font-size:12px;opacity:.8}.messages-container{flex:1;overflow-y:auto;padding:8px 16px;display:flex;flex-direction:column;gap:4px}.message{max-width:75%;padding:8px 12px;border-radius:8px}.message.sent{align-self:flex-end;background:var(--sent-bg);border-bottom-right-radius:4px}.message.received{align-self:flex-start;background:var(--received-bg);border-bottom-left-radius:4px}.message-content{word-wrap:break-word}.message-meta{display:flex;justify-content:flex-end;gap:4px;margin-top:4px;font-size:11px;color:var(--text-secondary)}.message-input-area{display:flex;align-items:center;padding:8px;background:#f0f0f0;gap:8px}#message-input{flex:1;padding:10px 16px;border:none;border-radius:24px;font-size:16px;outline:none}.send-btn{width:44px;height:44px;border-radius:50%;background:var(--secondary);border:none;font-size:20px;cursor:pointer;color:#fff}.connect-content{flex:1;overflow-y:auto;padding:20px}.qr-section{text-align:center;padding:20px;background:#fff;margin-bottom:20px;border-radius:8px}.address-box{width:100%;min-height:80px;padding:12px;background:#f5f5f5;border-radius:8px;font-size:10px;word-break:break-all;line-height:1.5;cursor:pointer;text-align:left}.divider{text-align:center;padding:20px;color:var(--text-secondary);font-weight:600}.paste-section{padding:0 0 20px}.paste-section textarea{width:100%;height:100px;padding:12px;border:1px solid var(--border);border-radius:8px;margin-bottom:8px;font-family:monospace;font-size:12px;resize:none}.btn{display:block;width:100%;padding:12px 24px;border:1px solid var(--border);border-radius:8px;background:#fff;font-size:16px;cursor:pointer;transition:background .2s}.btn:hover{background:#f5f5f5}.btn.primary{background:var(--primary);color:#fff;border-color:var(--primary)}.peers-list{margin-top:20px}.peers-list h3{margin-bottom:12px}.peer-item{display:flex;align-items:center;justify-content:space-between;padding:12px;background:#fff;border-radius:8px;margin-bottom:8px}.peer-status{width:12px;height:12px;border-radius:50%;background:var(--danger)}.peer-status.online{background:var(--secondary)}.bots-list{flex:1;overflow-y:auto;padding:16px}.bot-card{background:#fff;border-radius:8px;padding:16px;margin-bottom:12px}.bot-skills{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}.skill-tag{background:var(--primary-light);color:#fff;padding:4px 8px;border-radius:12px;font-size:12px}.bot-runner{padding:16px;background:#f5f5f5;border-radius:8px;margin-top:12px}.bot-runner textarea{width:100%;height:80px;padding:8px;border:1px solid var(--border);border-radius:4px;font-family:monospace;font-size:12px;resize:none}.settings-content{flex:1;overflow-y:auto;padding:20px}.setting-item{margin-bottom:20px}.setting-item label{display:block;margin-bottom:8px;font-weight:600}.setting-item select,.setting-item input{width:100%;padding:10px;border:1px solid var(--border);border-radius:8px;font-size:16px}.key-display{display:flex;align-items:center;gap:8px}.key-display code{flex:1;font-size:10px;background:#f5f5f5;padding:8px;border-radius:4px;word-break:break-all}.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:12px 24px;border-radius:8px;opacity:0;transition:opacity .3s;z-index:1000}.toast.show{opacity:1}.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--text-secondary);text-align:center;padding:40px}.empty-state p{margin-top:16px}.wasm-badge{font-size:11px;padding:4px 8px;border-radius:4px;margin-left:auto}.wasm-badge.ready{background:var(--secondary);color:#fff}.wasm-badge.loading{background:rgba(255,255,255,.2);color:#fff}.output-box{background:#1e1e1e;color:#d4d4d4;padding:12px;border-radius:8px;min-height:100px;font-family:monospace;font-size:12px;white-space:pre-wrap;margin-top:8px}
  </style>
</head>
<body>
  <div id="app">
    <div id="loading" class="screen active">
      <div class="spinner"></div>
      <p style="text-align:center;margin-top:16px">Loading...</p>
    </div>

    <div id="chat-list-screen" class="screen">
      <header class="app-header">
        <h1>Phat Chat</h1>
        <span id="wasm-badge" class="wasm-badge loading">JS Ready</span>
        <div class="header-actions">
          <button id="btn-connect" class="icon-btn" title="Connect">🔗</button>
          <button id="btn-bots" class="icon-btn" title="Bots">🤖</button>
          <button id="btn-settings" class="icon-btn" title="Settings">⚙️</button>
        </div>
      </header>
      <div id="chat-list" class="chat-list"></div>
      <button id="btn-new-chat" class="fab">✏️</button>
    </div>

    <div id="chat-view-screen" class="screen">
      <header class="chat-header">
        <button id="btn-back" class="icon-btn">←</button>
        <div class="chat-info">
          <span id="chat-name" class="chat-name">Chat</span>
          <span id="chat-status" class="chat-status">Online</span>
        </div>
      </header>
      <div id="messages-container" class="messages-container"></div>
      <div class="message-input-area">
        <input id="message-input" type="text" placeholder="Message or /bot <name> <cmd>" autocomplete="off">
        <button id="btn-send" class="send-btn">➤</button>
      </div>
    </div>

    <div id="connect-screen" class="screen">
      <header class="app-header">
        <button id="btn-connect-back" class="icon-btn">←</button>
        <h1>Connect P2P</h1>
      </header>
      <div class="connect-content">
        <div class="qr-section">
          <h3>Your Connection Code</h3>
          <p style="font-size:12px;color:var(--text-secondary);margin:8px 0">Share this with your peer</p>
          <div id="my-address" class="address-box" title="Click to copy">Generating...</div>
          <button id="btn-copy-address" class="btn" style="margin-top:8px">📋 Copy Code</button>
        </div>
        
        <div class="divider">OR enter peer's code</div>
        
        <div class="paste-section">
          <textarea id="peer-address-input" placeholder="Paste peer's code here..."></textarea>
          <button id="btn-connect-peer" class="btn primary">🔗 Connect</button>
        </div>
        
        <div class="peers-list">
          <h3>Connection Status</h3>
          <div id="peers-list"></div>
        </div>
      </div>
    </div>

    <div id="bots-screen" class="screen">
      <header class="app-header">
        <button id="btn-bots-back" class="icon-btn">←</button>
        <h1>Bots</h1>
        <button id="btn-add-bot" class="icon-btn">+</button>
      </header>
      <div id="bots-list" class="bots-list"></div>
    </div>

    <div id="bot-run-screen" class="screen">
      <header class="app-header">
        <button id="btn-bot-back" class="icon-btn">←</button>
        <h1 id="bot-run-title">Bot Runner</h1>
      </header>
      <div style="flex:1;padding:16px;overflow-y:auto;display:flex;flex-direction:column">
        <div class="bot-card">
          <h3 id="bot-name-display">Bot</h3>
          <p style="font-size:12px;color:var(--text-secondary)">JavaScript Runtime</p>
        </div>
        <div class="bot-runner">
          <label style="font-weight:600">Enter command:</label>
          <textarea id="bot-script-input" placeholder="Commands: calculate 2+2, time, echo hello, sqrt 16, random 1 100&#10;Or write JavaScript: Math.random() * 100"></textarea>
          <button id="btn-run-bot" class="btn primary" style="margin-top:8px">▶ Run</button>
        </div>
        <div style="flex:1;margin-top:16px">
          <h4>Output:</h4>
          <pre id="bot-output" class="output-box"></pre>
        </div>
      </div>
    </div>

    <div id="settings-screen" class="screen">
      <header class="app-header">
        <button id="btn-settings-back" class="icon-btn">←</button>
        <h1>Settings</h1>
      </header>
      <div class="settings-content">
        <div class="setting-item">
          <label>Your Public Key</label>
          <div class="key-display">
            <code id="public-key"></code>
            <button id="btn-copy-key" class="icon-btn">📋</button>
          </div>
        </div>
        <button id="btn-export-data" class="btn">📤 Export Data</button>
        <button id="btn-import-data" class="btn">📥 Import Data</button>
        <input type="file" id="import-file" accept=".json" style="display:none">
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script>
(function() {
  'use strict';

  // ============ CONFIG ============
  const DB_NAME = 'phat_v3';
  const DB_VERSION = 1;
  const STORES = { CHATS: 'chats', MESSAGES: 'messages', BOTS: 'bots', PEERS: 'peers', MEMORY: 'memory' };
  let db = null;

  // ============ STATE ============
  const state = {
    publicKey: null,
    currentChat: null,
    currentBot: null,
    peers: new Map(),
    bots: []
  };

  // ============ DATABASE ============
  async function openDB() {
    if (db) return db;
    return new Promise((resolve, reject) => {
      const req = indexedDB.open(DB_NAME, DB_VERSION);
      req.onerror = () => reject(req.error);
      req.onsuccess = () => { db = req.result; resolve(db); };
      req.onupgradeneeded = (e) => {
        const d = e.target.result;
        if (!d.objectStoreNames.contains(STORES.CHATS)) d.createObjectStore(STORES.CHATS, { keyPath: 'id' });
        if (!d.objectStoreNames.contains(STORES.MESSAGES)) {
          const m = d.createObjectStore(STORES.MESSAGES, { keyPath: 'id' });
          m.createIndex('chat_id', 'chat_id', { unique: false });
        }
        if (!d.objectStoreNames.contains(STORES.BOTS)) d.createObjectStore(STORES.BOTS, { keyPath: 'id' });
        if (!d.objectStoreNames.contains(STORES.PEERS)) d.createObjectStore(STORES.PEERS, { keyPath: 'id' });
        if (!d.objectStoreNames.contains(STORES.MEMORY)) {
          const mem = d.createObjectStore(STORES.MEMORY, { keyPath: 'id', autoIncrement: true });
          mem.createIndex('bot_id', 'bot_id', { unique: false });
        }
      };
    });
  }

  async function dbOp(store, mode, fn) {
    const database = await openDB();
    return new Promise((resolve, reject) => {
      const tx = database.transaction(store, mode);
      const s = tx.objectStore(store);
      const r = fn(s);
      r.onsuccess = () => resolve(r.result);
      r.onerror = () => reject(r.error);
    });
  }

  async function dbPut(store, data) { return dbOp(store, 'readwrite', s => s.put(data)); }
  async function dbGet(store, key) { return dbOp(store, 'readonly', s => s.get(key)); }
  async function dbGetAll(store) { return dbOp(store, 'readonly', s => s.getAll()); }
  async function dbDel(store, key) { return dbOp(store, 'readwrite', s => s.delete(key)); }

  async function dbGetByIndex(store, idx, val) {
    const database = await openDB();
    return new Promise((resolve, reject) => {
      const tx = database.transaction(store, 'readonly');
      const s = tx.objectStore(store);
      const i = s.index(idx);
      const r = i.getAll(val);
      r.onsuccess = () => resolve(r.result);
      r.onerror = () => reject(r.error);
    });
  }

  async function getMessages(chatId) {
    const msgs = await dbGetByIndex(STORES.MESSAGES, 'chat_id', chatId);
    return msgs.sort((a, b) => a.timestamp - b.timestamp);
  }

  // ============ CRYPTO ============
  async function sha256(text) {
    const enc = new TextEncoder();
    const hash = await crypto.subtle.digest('SHA-256', enc.encode(text));
    return btoa(String.fromCharCode(...new Uint8Array(hash)));
  }

  async function hashMsg(msg) {
    const str = JSON.stringify({ chat_id: msg.chat_id, from: msg.from, ts: msg.timestamp, type: msg.type, content: msg.content, prev: msg.prev });
    return sha256(str);
  }

  async function genKeys() {
    const kp = await crypto.subtle.generateKey('Ed25519', true, ['sign', 'verify']);
    const pubRaw = await crypto.subtle.exportKey('raw', kp.publicKey);
    const privRaw = await crypto.subtle.exportKey('pkcs8', kp.privateKey);
    return {
      pub: btoa(String.fromCharCode(...new Uint8Array(pubRaw))),
      priv: btoa(String.fromCharCode(...new Uint8Array(privRaw))),
      kp
    };
  }

  async function loadKeys() {
    const raw = localStorage.getItem('phat_keys');
    if (!raw) return null;
    const keys = JSON.parse(raw);
    if (keys.priv) {
      const privBin = Uint8Array.from(atob(keys.priv), c => c.charCodeAt(0));
      keys.kp = await crypto.subtle.importKey('pkcs8', privBin, 'Ed25519', true, ['sign']);
    }
    return keys;
  }

  async function saveKeys(keys) {
    localStorage.setItem('phat_keys', JSON.stringify({ pub: keys.pub, priv: keys.priv }));
  }

  // ============ P2P CONNECTIONS ============
  const p2p = {
    connections: new Map(),
    pendingOffers: new Map(),
    pendingAnswers: new Map(),
    listeners: [],

    on(fn) { this.listeners.push(fn); },
    
    emit(event, data) { this.listeners.forEach(fn => fn(event, data)); },

    async createConnection(peerId) {
      const conn = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
      const dc = conn.createDataChannel('chat', { ordered: true });
      
      const p2pConn = { conn, dc, peerId, status: 'connecting' };
      
      dc.onopen = () => {
        p2pConn.status = 'connected';
        this.emit('status', { peerId, status: 'connected' });
      };
      
      dc.onclose = () => {
        p2pConn.status = 'disconnected';
        this.emit('status', { peerId, status: 'disconnected' });
      };
      
      dc.onmessage = e => {
        try {
          const data = JSON.parse(e.data);
          this.emit('message', { peerId, data });
        } catch {}
      };

      conn.onicecandidate = e => {
        if (!e.candidate) {
          this.emit('iceComplete', { peerId });
        }
      };

      conn.onconnectionstatechange = () => {
        this.emit('status', { peerId, status: conn.connectionState });
      };

      this.connections.set(peerId, p2pConn);
      return p2pConn;
    },

    async createOffer(peerId) {
      let p2pConn = this.connections.get(peerId);
      if (!p2pConn) p2pConn = await this.createConnection(peerId);
      
      const offer = await p2pConn.conn.createOffer();
      await p2pConn.conn.setLocalDescription(offer);
      
      return { offer, p2pConn };
    },

    async acceptOffer(peerId, offer) {
      const conn = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
      
      conn.ondatachannel = e => {
        const p2pConn = { conn, dc: e.channel, peerId, status: 'connecting' };
        this.connections.set(peerId, p2pConn);
        
        p2pConn.dc.onopen = () => {
          p2pConn.status = 'connected';
          this.emit('status', { peerId, status: 'connected' });
        };
        p2pConn.dc.onclose = () => {
          p2pConn.status = 'disconnected';
          this.emit('status', { peerId, status: 'disconnected' });
        };
        p2pConn.dc.onmessage = ev => {
          try {
            const data = JSON.parse(ev.data);
            this.emit('message', { peerId, data });
          } catch {}
        };
      };

      conn.onicecandidate = e => {
        if (!e.candidate) this.emit('iceComplete', { peerId });
      };

      conn.onconnectionstatechange = () => {
        this.emit('status', { peerId, status: conn.connectionState });
      };

      await conn.setRemoteDescription(offer);
      const answer = await conn.createAnswer();
      await conn.setLocalDescription(answer);
      
      return { answer };
    },

    async acceptAnswer(peerId, answer) {
      const p2pConn = this.connections.get(peerId);
      if (p2pConn) {
        await p2pConn.conn.setRemoteDescription(answer);
      }
    },

    send(peerId, data) {
      const p2pConn = this.connections.get(peerId);
      if (p2pConn?.dc?.readyState === 'open') {
        p2pConn.dc.send(JSON.stringify(data));
        return true;
      }
      return false;
    },

    broadcast(data) {
      for (const [peerId] of this.connections) {
        this.send(peerId, data);
      }
    },

    disconnect(peerId) {
      const p2pConn = this.connections.get(peerId);
      if (p2pConn) {
        p2pConn.dc?.close();
        p2pConn.conn?.close();
        this.connections.delete(peerId);
      }
    }
  };

  // ============ BOT ENGINE ============
  const botEngine = {
    skills: {
      calculate(expr) {
        try {
          const safe = expr.replace(/[^0-9+\-*/().%\s]/g, '');
          const result = Function(`"use strict"; return (${safe})`)();
          return String(result);
        } catch (e) {
          throw new Error('Invalid math expression');
        }
      },
      
      sqrt(n) {
        const r = Math.sqrt(Number(n));
        if (isNaN(r)) throw new Error('Invalid number');
        return r;
      },
      
      pow(a, b) {
        return Math.pow(Number(a), Number(b));
      },
      
      random(min, max) {
        const lo = parseInt(min) || 0;
        const hi = parseInt(max) || 100;
        return Math.floor(Math.random() * (hi - lo + 1)) + lo;
      },
      
      time() {
        return new Date().toLocaleTimeString();
      },
      
      date() {
        return new Date().toLocaleDateString();
      },
      
      echo(text) {
        return String(text || '');
      },
      
      uppercase(text) {
        return String(text).toUpperCase();
      },
      
      lowercase(text) {
        return String(text).toLowerCase();
      },
      
      reverse(text) {
        return String(text).split('').reverse().join('');
      },
      
      length(text) {
        return String(text).length;
      },
      
      json(obj) {
        try {
          return JSON.stringify(JSON.parse(obj), null, 2);
        } catch {
          return JSON.stringify({ value: obj }, null, 2);
        }
      },
      
      help() {
        return `Available commands:
- calculate <expr>: Math (e.g., calculate 2+2*3)
- sqrt <n>: Square root
- pow <a> <b>: Power
- random <min> <max>: Random number
- time: Current time
- date: Current date
- echo <text>: Echo text
- uppercase <text>: UPPERCASE
- lowercase <text>: lowercase
- reverse <text>: reversed text
- length <text>: Character count
- json <obj>: Format as JSON

Or write any JavaScript!`;
      }
    },

    run(code) {
      const output = [];
      
      const ctx = {
        console: {
          log: (...args) => output.push(args.map(String).join(' '))
        },
        Math,
        Date,
        JSON,
        String,
        Number,
        Array,
        Object,
        parseInt,
        parseFloat,
        isNaN,
        isFinite
      };

      const cmdMatch = code.trim().match(/^(\w+)(?:\s+(.*))?$/);
      if (cmdMatch) {
        const [, cmd, args] = cmdMatch;
        const skillArgs = args ? args.split(/\s+/) : [];
        
        if (this.skills[cmd]) {
          try {
            const result = this.skills[cmd](...skillArgs);
            return { success: true, result: String(result), output: output.join('\n') };
          } catch (e) {
            return { success: false, error: e.message, output: output.join('\n') };
          }
        }
      }

      try {
        const fn = new Function(...Object.keys(ctx), `"use strict";\n${code}`);
        const result = fn(...Object.values(ctx));
        return { success: true, result: result !== undefined ? String(result) : 'undefined', output: output.join('\n') };
      } catch (e) {
        return { success: false, error: e.message, output: output.join('\n') };
      }
    }
  };

  // ============ UI HELPERS ============
  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id + '-screen').classList.add('active');
  }

  function toast(msg, dur = 3000) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), dur);
  }

  function fmtTime(ts) {
    if (!ts) return '';
    const d = new Date(ts);
    const now = new Date();
    if (d.toDateString() === now.toDateString()) {
      return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }
    return d.toLocaleDateString([], { month: 'short', day: 'numeric' });
  }

  function escHtml(text) {
    const d = document.createElement('div');
    d.textContent = text || '';
    return d.innerHTML;
  }

  // ============ RENDER FUNCTIONS ============
  async function renderChats() {
    const chats = (await dbGetAll(STORES.CHATS)).sort((a, b) => (b.last_ts || 0) - (a.last_ts || 0));
    const c = document.getElementById('chat-list');
    
    if (!chats.length) {
      c.innerHTML = '<div class="empty-state"><span style="font-size:48px">💬</span><p>No chats yet. Tap + to create!</p></div>';
      return;
    }
    
    c.innerHTML = chats.map(ch => `
      <div class="chat-item" data-id="${ch.id}">
        <div class="chat-avatar">${(ch.name || 'C')[0].toUpperCase()}</div>
        <div class="chat-details">
          <div class="chat-title">${escHtml(ch.name)}</div>
          <div class="chat-preview">${escHtml(ch.last_preview || '')}</div>
        </div>
        <div class="chat-meta">
          <span class="chat-time">${fmtTime(ch.last_ts)}</span>
        </div>
      </div>
    `).join('');
    
    c.querySelectorAll('.chat-item').forEach(el => el.addEventListener('click', () => openChat(el.dataset.id)));
  }

  async function renderMessages(chatId) {
    const msgs = await getMessages(chatId);
    const c = document.getElementById('messages-container');
    
    c.innerHTML = msgs.map(m => `
      <div class="message ${m.from === state.publicKey ? 'sent' : 'received'}">
        <div class="message-content">${escHtml(m.content)}</div>
        <div class="message-meta">
          <span class="message-time">${fmtTime(m.timestamp)}</span>
          ${m.from === state.publicKey ? '<span>✓</span>' : ''}
        </div>
      </div>
    `).join('');
    
    c.scrollTop = c.scrollHeight;
  }

  async function renderBots() {
    state.bots = await dbGetAll(STORES.BOTS);
    const c = document.getElementById('bots-list');
    
    if (!state.bots.length) {
      c.innerHTML = '<div class="empty-state"><span style="font-size:48px">🤖</span><p>No bots. Tap + to create!</p></div>';
      return;
    }
    
    c.innerHTML = state.bots.map(bot => `
      <div class="bot-card">
        <h3>${escHtml(bot.name)}</h3>
        <p style="font-size:12px;color:var(--text-secondary)">JavaScript bot</p>
        <div class="bot-skills">
          ${['calculate', 'time', 'echo', 'JS'].map(s => `<span class="skill-tag">${s}</span>`).join('')}
        </div>
        <button class="btn" style="margin-top:12px" data-bot-id="${bot.id}">▶ Open Bot</button>
      </div>
    `).join('');
    
    c.querySelectorAll('button[data-bot-id]').forEach(btn => {
      btn.addEventListener('click', () => openBotRunner(btn.dataset.botId));
    });
  }

  async function renderPeers() {
    const peers = await dbGetAll(STORES.PEERS);
    const c = document.getElementById('peers-list');
    
    let html = '';
    
    for (const [peerId, p2pConn] of p2p.connections) {
      const status = p2pConn.status === 'connected' ? 'online' : '';
      html += `
        <div class="peer-item">
          <span style="flex:1">Peer ${peerId.slice(0, 16)}...</span>
          <div class="peer-status ${status}"></div>
          <button class="btn" style="width:auto;padding:4px 12px;margin-left:8px;font-size:12px" data-disconnect="${peerId}">×</button>
        </div>
      `;
    }
    
    for (const [peerId] of p2p.pendingOffers) {
      html += `
        <div class="peer-item">
          <span style="flex:1;color:var(--text-secondary)">Connecting to ${peerId.slice(0, 16)}...</span>
          <div class="peer-status"></div>
        </div>
      `;
    }
    
    if (!html) html = '<p style="color:var(--text-secondary);font-size:12px">No connections yet</p>';
    
    c.innerHTML = html;
    
    c.querySelectorAll('[data-disconnect]').forEach(btn => {
      btn.addEventListener('click', () => {
        p2p.disconnect(btn.dataset.disconnect);
        renderPeers();
      });
    });
  }

  async function openChat(chatId) {
    state.currentChat = await dbGet(STORES.CHATS, chatId);
    document.getElementById('chat-name').textContent = state.currentChat?.name || 'Chat';
    await renderMessages(chatId);
    showScreen('chat-view');
  }

  window.openBotRunner = async function(botId) {
    state.currentBot = state.bots.find(b => b.id === botId);
    if (!state.currentBot) return;
    
    document.getElementById('bot-run-title').textContent = state.currentBot.name;
    document.getElementById('bot-name-display').textContent = state.currentBot.name;
    document.getElementById('bot-output').textContent = '';
    document.getElementById('bot-script-input').value = '';
    showScreen('bot-run');
  };

  async function addMessage(chatId, from, content, type = 'text') {
    const msgs = await getMessages(chatId);
    const prev = msgs.length ? msgs[msgs.length - 1].id : null;
    
    const msg = {
      id: await hashMsg({ chat_id: chatId, from, ts: Date.now(), type, content, prev }),
      chat_id: chatId,
      from,
      timestamp: Date.now(),
      type,
      content,
      prev,
      status: 'sent'
    };
    
    await dbPut(STORES.MESSAGES, msg);
    
    const chat = await dbGet(STORES.CHATS, chatId);
    if (chat) {
      chat.last_message = msg.id;
      chat.last_ts = msg.timestamp;
      chat.last_preview = content.slice(0, 50);
      await dbPut(STORES.CHATS, chat);
    }
    
    return msg;
  }

  async function sendBotResponse(chatId, content, prevMsgId) {
    const botMsg = {
      id: await hashMsg({ chat_id: chatId, from: 'bot', ts: Date.now(), type: 'text', content, prev: prevMsgId }),
      chat_id: chatId,
      from: 'bot',
      timestamp: Date.now(),
      type: 'text',
      content,
      prev: prevMsgId,
      status: 'sent'
    };
    
    await dbPut(STORES.MESSAGES, botMsg);
    p2p.broadcast({ type: 'message', ...botMsg });
    
    if (state.currentChat?.id === chatId) {
      await renderMessages(chatId);
    }
  }

  // ============ INIT ============
  async function init() {
    try {
      await openDB();
      
      let keys = await loadKeys();
      if (!keys) {
        keys = await genKeys();
        await saveKeys(keys);
      }
      state.publicKey = keys.pub;
      
      document.getElementById('public-key').textContent = state.publicKey.slice(0, 32) + '...';
      document.getElementById('wasm-badge').textContent = 'JS Ready';
      document.getElementById('wasm-badge').className = 'wasm-badge ready';
      
      // P2P events
      p2p.on((event, data) => {
        if (event === 'message' && data.data.type === 'message') {
          dbPut(STORES.MESSAGES, data.data);
          if (state.currentChat?.id === data.data.chat_id) {
            renderMessages(data.data.chat_id);
          }
        }
        if (event === 'status') {
          toast(`Peer ${data.status}`);
          renderPeers();
        }
      });
      
      // Load saved peers
      const savedPeers = await dbGetAll(STORES.PEERS);
      for (const p of savedPeers) {
        if (p.pending && p.offer) {
          try {
            const { answer } = await p2p.acceptOffer(p.id, JSON.parse(p.offer));
            p.answer = JSON.stringify(answer);
            p.pending = false;
            await dbPut(STORES.PEERS, p);
            toast('Connected to peer!');
          } catch (e) {
            console.error('Failed to connect:', e);
          }
        }
      }
      
      await renderChats();
      await renderBots();
      await renderPeers();
      await generateMyAddress();
      
      setupListeners();
      
      document.getElementById('loading').classList.remove('active');
      showScreen('chat-list');
      
    } catch (e) {
      console.error('Init error:', e);
      document.querySelector('#loading p').textContent = 'Error: ' + e.message;
    }
  }

  async function generateMyAddress() {
    try {
      const { offer } = await p2p.createOffer('self');
      await p2p.createOffer(state.publicKey);
      const addr = JSON.stringify({ v: 1, pub: state.publicKey, offer: offer.sdp });
      const encoded = btoa(addr);
      document.getElementById('my-address').textContent = encoded;
      return encoded;
    } catch (e) {
      document.getElementById('my-address').textContent = 'Error generating address';
      return null;
    }
  }

  function setupListeners() {
    // Navigation
    document.getElementById('btn-connect').addEventListener('click', () => { showScreen('connect'); renderPeers(); });
    document.getElementById('btn-connect-back').addEventListener('click', () => showScreen('chat-list'));
    document.getElementById('btn-bots').addEventListener('click', () => { renderBots(); showScreen('bots'); });
    document.getElementById('btn-bots-back').addEventListener('click', () => showScreen('chat-list'));
    document.getElementById('btn-settings').addEventListener('click', () => showScreen('settings'));
    document.getElementById('btn-settings-back').addEventListener('click', () => showScreen('chat-list'));
    document.getElementById('btn-back').addEventListener('click', () => { state.currentChat = null; showScreen('chat-list'); });
    document.getElementById('btn-bot-back').addEventListener('click', () => showScreen('bots'));
    
    // New chat
    document.getElementById('btn-new-chat').addEventListener('click', async () => {
      const chat = { id: crypto.randomUUID(), name: 'Chat ' + Date.now(), participants: [state.publicKey], created_at: Date.now() };
      await dbPut(STORES.CHATS, chat);
      await renderChats();
      openChat(chat.id);
    });
    
    // Send message
    document.getElementById('btn-send').addEventListener('click', sendMsg);
    document.getElementById('message-input').addEventListener('keypress', e => {
      if (e.key === 'Enter') sendMsg();
    });
    
    // Connect peer
    document.getElementById('btn-copy-address').addEventListener('click', () => {
      const addr = document.getElementById('my-address').textContent;
      navigator.clipboard.writeText(addr);
      toast('Address copied!');
    });
    
    document.getElementById('my-address').addEventListener('click', () => {
      const addr = document.getElementById('my-address').textContent;
      navigator.clipboard.writeText(addr);
      toast('Address copied!');
    });
    
    document.getElementById('btn-connect-peer').addEventListener('click', async () => {
      const input = document.getElementById('peer-address-input').value.trim();
      if (!input) { toast('Enter peer address'); return; }
      
      try {
        const decoded = JSON.parse(atob(input));
        if (!decoded.pub || !decoded.offer) {
          toast('Invalid address format');
          return;
        }
        
        toast('Connecting...');
        
        const peerId = decoded.pub;
        p2p.pendingOffers.set(peerId, true);
        
        const { answer } = await p2p.acceptOffer(peerId, { type: 'offer', sdp: decoded.offer });
        
        await dbPut(STORES.PEERS, {
          id: peerId,
          offer: JSON.stringify({ type: 'offer', sdp: decoded.offer }),
          answer: JSON.stringify(answer),
          pending: false,
          ts: Date.now()
        });
        
        toast('Connection initiated!');
        renderPeers();
        
      } catch (e) {
        console.error('Connect error:', e);
        toast('Connection failed: ' + e.message);
      }
    });
    
    // Bots
    document.getElementById('btn-add-bot').addEventListener('click', async () => {
      const bot = { id: crypto.randomUUID(), name: 'Bot ' + (state.bots.length + 1), created_at: Date.now() };
      await dbPut(STORES.BOTS, bot);
      await renderBots();
      toast('Bot created!');
    });
    
    document.getElementById('btn-run-bot').addEventListener('click', () => {
      const code = document.getElementById('bot-script-input').value;
      if (!code.trim()) { toast('Enter a command'); return; }
      
      const result = botEngine.run(code);
      const output = document.getElementById('bot-output');
      
      if (result.success) {
        output.textContent = result.output 
          ? `${result.output}\n\n=> ${result.result}`
          : `=> ${result.result}`;
      } else {
        output.textContent = `Error: ${result.error}`;
      }
    });
    
    // Settings
    document.getElementById('btn-copy-key').addEventListener('click', () => {
      navigator.clipboard.writeText(state.publicKey);
      toast('Key copied!');
    });
    
    document.getElementById('btn-export-data').addEventListener('click', async () => {
      const data = {
        chats: await dbGetAll(STORES.CHATS),
        bots: await dbGetAll(STORES.BOTS),
        messages: await dbGetAll(STORES.MESSAGES),
        publicKey: state.publicKey
      };
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'phat-backup.json';
      a.click();
      toast('Data exported!');
    });
    
    document.getElementById('btn-import-data').addEventListener('click', () => document.getElementById('import-file').click());
    document.getElementById('import-file').addEventListener('change', async e => {
      if (!e.target.files[0]) return;
      const data = JSON.parse(await e.target.files[0].text());
      for (const c of data.chats || []) await dbPut(STORES.CHATS, c);
      for (const b of data.bots || []) await dbPut(STORES.BOTS, b);
      await renderChats();
      await renderBots();
      toast('Data imported!');
    });
  }

  async function sendMsg() {
    const inp = document.getElementById('message-input');
    const content = inp.value.trim();
    if (!content || !state.currentChat) return;
    
    inp.value = '';
    
    const msg = await addMessage(state.currentChat.id, state.publicKey, content);
    p2p.broadcast({ type: 'message', ...msg });
    await renderMessages(state.currentChat.id);
    await renderChats();
    
    // Bot commands
    const lower = content.toLowerCase();
    
    if (lower.startsWith('/bot ')) {
      const parts = content.slice(5).split(/\s+/);
      const botName = parts[0].toLowerCase();
      const query = parts.slice(1).join(' ');
      
      const bot = state.bots.find(b => b.name.toLowerCase() === botName);
      
      if (bot) {
        const result = botEngine.run(query);
        if (result.success) {
          await sendBotResponse(state.currentChat.id, result.result, msg.id);
        } else {
          await sendBotResponse(state.currentChat.id, 'Error: ' + result.error, msg.id);
        }
      } else {
        await sendBotResponse(state.currentChat.id, 'Bot not found. Available bots: ' + state.bots.map(b => b.name).join(', '), msg.id);
      }
    }
    
    if (lower === '/help' || lower === '/commands') {
      await sendBotResponse(state.currentChat.id, 'Commands:\n/bot <name> <query> - Run bot\n/new - New chat\n/help - Show this', msg.id);
    }
  }

  document.addEventListener('DOMContentLoaded', init);
})();
  </script>
</body>
</html>
